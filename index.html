<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poster Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h2>🎉 Poster Generator</h2>

  <input type="text" id="name" placeholder="Name Surname" />
  <input type="text" id="designation" placeholder="Designation" />
  <input type="file" id="photo" accept="image/*" />

  <button onclick="generate()">Generate</button>

  <canvas id="canvas" width="1200" height="628"></canvas>

  <a id="download" download="poster.png">Download</a>
</div>

<script src="script.js"></script>
</body>
</html>
